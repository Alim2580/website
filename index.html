<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Play Store Clone</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #ffffff;
            color: #202124;
        }

        /* হেডার বা নেভিগেশন বার */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 30px;
            border-bottom: 1px solid #e0e0e0;
            position: sticky;
            top: 0;
            background: white;
            z-index: 100;
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
            color: #01875f; /* প্লে স্টোরের সিগনেচার গ্রিন কালার */
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .search-bar {
            width: 40%;
            position: relative;
        }

        .search-bar input {
            width: 100%;
            padding: 12px 20px;
            border: 1px solid #dfe1e5;
            border-radius: 8px;
            background-color: #f1f3f4;
            font-size: 16px;
            outline: none;
        }

        .search-bar input:focus {
            background-color: #fff;
            box-shadow: 0 1px 6px rgba(32,33,36,0.28);
            border-color: transparent;
        }

        /* মেইন কন্টেইনার */
        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .section-title {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #202124;
        }

        /* অ্যাপ গ্রিড লেআউট */
        .app-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 25px;
        }

        /* সিঙ্গেল অ্যাপ কার্ড */
        .app-card {
            display: flex;
            flex-direction: column;
            cursor: pointer;
            transition: transform 0.2s;
            text-decoration: none;
            color: inherit;
        }

        .app-card:hover {
            transform: translateY(-2px);
        }

        .app-icon {
            width: 100%;
            aspect-ratio: 1/1;
            background-color: #f1f3f4;
            border-radius: 20px;
            object-fit: cover;
            border: 1px solid #e0e0e0;
            margin-bottom: 10px;
        }

        .app-name {
            font-size: 14px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
        }

        .app-developer {
            font-size: 12px;
            color: #5f6368;
            margin-bottom: 4px;
        }

        .app-rating {
            font-size: 12px;
            font-weight: bold;
            color: #202124;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .download-btn {
            margin-top: 8px;
            background-color: #01875f;
            color: white;
            text-align: center;
            padding: 8px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: bold;
            transition: background 0.2s;
        }

        .download-btn:hover {
            background-color: #006648;
        }

        /* রেসপনসিভ ডিজাইন (মোবাইলের জন্য) */
        @media (max-width: 768px) {
            header {
                padding: 10px 15px;
            }
            .search-bar {
                display: none; /* মোবাইলে সার্চ বার হাইড করা হয়েছে সিম্পল রাখার জন্য */
            }
            .app-grid {
                grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
                gap: 15px;
            }
            .app-icon {
                border-radius: 16px;
            }
            .app-name {
                font-size: 13px;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M3.25 2.75V21.25L17.5 12L3.25 2.75Z" fill="#00E676"/>
                <path d="M17.5 12L3.25 2.75V3.5L16.25 12L17.5 12Z" fill="#00B0FF"/>
                <path d="M17.5 12L3.25 21.25V20.5L16.25 12L17.5 12Z" fill="#FF3D00"/>
            </svg>
            Play Store
        </div>
        <div class="search-bar">
            <input type="text" placeholder="অ্যাপ এবং গেম খুঁজুন...">
        </div>
        <div style="width: 40px;"></div> </header>

    <div class="container">

        <div class="app-grid">

                <a href="YOUR_APK_DOWNLOAD_LINK_HERE" class="download-btn">ডাউনলোড</a>
            </div>

            <div class="app-card">
                <img src="https://via.placeholder.com/150" alt="App Icon" class="app-icon">
                <div class="app-name">WhatsApp Messenger</div>
                <div class="app-developer">WhatsApp LLC</div>
                <div class="app-rating">৪.৩ ★</div>
                <a href="YOUR_APK_DOWNLOAD_LINK_HERE" class="download-btn">ডাউনলোড</a>
            </div>

            <div class="app-card">
                <img src="https://via.placeholder.com/150" alt="App Icon" class="app-icon">
                <div class="app-name">Subway Surfers</div>
                <div class="app-developer">SYBO Games</div>
                <div class="app-rating">৪.6 ★</div>
                <a href="YOUR_APK_DOWNLOAD_LINK_HERE" class="download-btn">ডাউনলোড</a>
            </div>

            <div class="app-card">

                <div class="app-rating">৪.৪ ★</div>

        </div>
    </div>

</body>
</html>
